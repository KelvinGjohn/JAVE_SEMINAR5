<html xmlns:th="http://www.thymeleaf.org">

<body>
<h1>Please add product data:</h1>

<form method="post" th:object="${product}" 
th:action="@{/product/crud/update/__${id}__}">

<table>
<tr>
<td> Title </td>
<td> <input type="text" th:field="*{title}"  />      </td>
</tr>

<tr>
<td> Category </td>
<td> <input type="text" th:field="*{category}"  />      </td>
</tr>

<tr>
<td> Price </td>
<td> <input type="text" th:field="*{price}"  />      </td>
</tr>

<tr>
<td> Quantity </td>
<td> <input type="text" th:field="*{quantity}"  />      </td>
</tr>

<tr>
<td> Description </td>
<td> <input type="text" th:field="*{description}"  />      </td>
</tr>

</table>

<input  type="submit" />

</form>




</body>



</html>
